model:
  name: bert-base-uncased
  max_length: 128
training:
  output_dir: artifacts/classifier
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 0.00002
  weight_decay: 0.01
  seed: 1508
data:
  dataset_name: go_emotions
  text_column: text
  label_column: labels
